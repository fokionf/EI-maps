const HAS_CONTROLS = false;
const SHOW_ARCS_DEFAULT = false;

const tooltip = document.getElementById('tooltip');

function updateLayers() {
  const showArcs = HAS_CONTROLS ? document.getElementById('togArcs').checked : SHOW_ARCS_DEFAULT;
  const showLabels = HAS_CONTROLS ? document.getElementById('togLabels').checked : true;

  const layers = [
    new deck.GeoJsonLayer({
      id: 'polygons',
      data: GEOJSON,
      getFillColor: f => f.properties.fill_color,
      getLineColor: f => f.properties.line_color,
      getLineWidth: 2,
      lineWidthMinPixels: 1,
      pickable: true,
      stroked: true,
      filled: true,
      autoHighlight: true,
      highlightColor: [255, 255, 100, 80],
    }),
    new deck.ScatterplotLayer({
      id: 'points',
      data: POINTS,
      getPosition: d => [d.lon, d.lat],
      getFillColor: d => [...d.color, 220],
      getRadius: 5000,
      radiusMinPixels: 4,
      radiusMaxPixels: 12,
      pickable: true,
      autoHighlight: true,
    }),
  ];

  if (showArcs) {
    layers.push(new deck.ArcLayer({
      id: 'arcs',
      data: ARCS,
      getSourcePosition: d => [d.from_lon, d.from_lat],
      getTargetPosition: d => [d.to_lon, d.to_lat],
      getSourceColor: d => [...d.color, 200],
      getTargetColor: d => [...d.color, 200],
      getWidth: d => Math.max(1.5, d.avg_rating / 2000),
      widthMinPixels: 1,
      pickable: true,
      autoHighlight: true,
    }));
  }

  if (showLabels) {
    layers.push(new deck.TextLayer({
      id: 'labels',
      data: POINTS,
      getPosition: d => [d.lon, d.lat],
      getText: d => d.label || d.zone,
      getSize: 13,
      getColor: [40, 40, 40, 240],
      getPixelOffset: [0, 16],
      fontFamily: "'DM Sans', system-ui, sans-serif",
      fontWeight: 500,
      outlineWidth: 2,
      outlineColor: [255, 255, 255, 200],
    }));
  }

  deckgl.setProps({ layers });
}

function onHover(info) {
  if (!info.object) { tooltip.style.display = 'none'; return; }
  const o = info.object;
  let html = '';
  if (o.properties) {
    html = '<b>' + (o.properties.zone || o.properties.iso || '') + '</b>';
    if (o.properties.iso) html += '<br>ISO: ' + o.properties.iso;
    if (o.properties.name) html += '<br>' + o.properties.name;
  } else if (o.from_zone) {
    html = '<b>' + o.from_zone + ' → ' + o.to_zone + '</b>';
    html += '<br>Forward: ' + o.rating_fwd.toLocaleString() + ' MW';
    html += '<br>Backward: ' + o.rating_bwd.toLocaleString() + ' MW';
  } else if (o.zone) {
    html = '<b>' + o.zone + '</b>';
    if (o.iso) html += '<br>ISO: ' + o.iso;
    if (o.label && o.label !== o.zone) html += '<br>' + o.label;
  }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (info.x + 12) + 'px';
  tooltip.style.top = (info.y + 12) + 'px';
}

const deckgl = new deck.DeckGL({
  container: 'map',
  mapStyle: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  initialViewState: { latitude: 40.5, longitude: -79.0, zoom: 4.8, pitch: 0 },
  controller: true,
  onHover: onHover,
  layers: [],
});

updateLayers();
</script>
